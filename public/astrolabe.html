<html lang="en" class="hide-spokes bg-flat"><head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js" integrity="sha512-iZ2ORl595Wx6miw+GuadDet4WQbdSWS3JLMoNfY8cRGoEFy6oT3G9IbcrBeL6AfkgpA51ETt/faX6yLV+/gFJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function() {
        // Capture host references before any artifact code runs: Window.parent
        // is [Replaceable] (a top-level `var parent` in artifact code would
        // replace the accessor with a data property), and a top-level
        // `const crypto` would shadow the global — either would otherwise
        // silently break the bridge for artifacts that worked before.
        const realParent = window.parent;
        const cryptoObj = window.crypto;
        // crypto.randomUUID exists only in Secure Contexts; fall back to a
        // unique non-crypto id elsewhere (http://LAN-IP dev flows) —
        // uniqueness is what the bridge needs, unpredictability is
        // defense-in-depth on top of the source guards.
        const newRequestId =
          cryptoObj && typeof cryptoObj.randomUUID === "function"
            ? function () { return cryptoObj.randomUUID(); }
            : function () { return Date.now() + "-" + Math.random(); };
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            realParent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            realParent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            realParent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        // Bridge request ids are crypto-random (not sequential) so they
        // cannot be predicted by other frames in the tab.
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = newRequestId();
              callbacksMap.set(id, { resolve, reject });
              realParent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = newRequestId();
              callbacksMap.set(id, { resolve, reject });
              realParent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = newRequestId();
              callbacksMap.set(id, { resolve, reject });
              realParent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = newRequestId();
              callbacksMap.set(id, { resolve, reject });
              realParent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = newRequestId();
              callbacksMap.set(id, { resolve, reject });
              realParent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = newRequestId();
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Null-body statuses: Response(stream, {status: 204}) throws
                // per the Fetch spec, which would escape this resolver and
                // hang the artifact's await forever.
                if (response.status === 204 || response.status === 205 || response.status === 304) {
                  try {
                    resolve(new Response(null, {
                      status: response.status,
                      statusText: response.statusText,
                      headers: response.headers
                    }));
                  } catch (err) {
                    // Invalid statusText/header bytes can throw here too.
                    reject(new TypeError(
                      'Bridge fetch: unconstructable response (status ' + response.status + ')'
                    ));
                  }
                  return;
                }
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream. Response()
                // requires status in [200, 599]; an opaque/no-cors fetch
                // forwards status 0, which would throw here and escape the
                // resolver, hanging the artifact's await. Surface it as a
                // network-error-shaped rejection instead.
                try {
                  resolve(new Response(stream, {
                    status: response.status,
                    statusText: response.statusText,
                    headers: response.headers
                  }));
                } catch (err) {
                  streamControllers.delete(channelId);
                  reject(new TypeError(
                    'Bridge fetch: unconstructable response (status ' + response.status + ')'
                  ));
                }
              },
              reject,
              channelId
            });
            
            realParent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          // Only the embedding parent may drive the bridge — sibling and
          // nested frames can also postMessage into this window.
          if (event.source !== realParent) return;
          if (event.data.type === 'takeScreenshot') {
            // Echo the request's nonce so the requester can correlate the
            // reply to ITS request — a reply without the expected nonce
            // (e.g. from a stale pre-remount artifact) is ignored upstream.
            const screenshotNonce = event.data.nonce;
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              realParent.postMessage({
                type: 'screenshotError',
                nonce: screenshotNonce,
                error: new Error('Root element not found'),
              }, '*');
              return;
            }
            // Catch CDN load failures (htmlToImage undefined) and toPng errors
            // so the parent always gets a response instead of hanging forever.
            try {
              const screenshot = await htmlToImage.toPng(rootElement, {
                imagePlaceholder:
                  "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
              });
              realParent.postMessage({
                type: 'screenshotData',
                nonce: screenshotNonce,
                data: screenshot,
              }, '*');
            } catch (err) {
              realParent.postMessage({
                type: 'screenshotError',
                nonce: screenshotNonce,
                error: err instanceof Error ? err : new Error(String(err)),
              }, '*');
            }
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (!callback) return;
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (!callback) return;
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (!callback) return;
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (!callback) return;
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (!callback) return;
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (!callback) return;
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              realParent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            realParent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            realParent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          realParent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          realParent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();
    </script>
  
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Planetary Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --page:#05070C;
    --ground:#080B12;
    --zband:#0E1422;
    --orbit:#1A2340;
    --spoke:rgba(255,255,255,0.06);
    --divider:rgba(255,255,255,0.14);
    --label:#8898BB;
    --label-dim:#3A4A6A;
    --zodiac-active:rgba(255,255,255,0.055);
    --zodiac-arc:rgba(255,255,255,0.40);
    --conjunction:rgba(232,239,255,1);
    --hand:#EDE6CF;
    --sun:#D4A843;
    --mercury:#9A9AAE;
    --venus:#C8B87A;
    --earth:#4A7FC1;
    --mars:#C46A3A;
    --jupiter:#BFA06A;
    --saturn:#C8BE9A;
    --uranus:#6AACB8;
    --neptune:#4A5CAA;
    --moon:#D0D4DC;
    --serif:'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    --mono:'DM Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--page);overflow:hidden;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;
    -webkit-tap-highlight-color:transparent;}
  #stage-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #dial{display:block;touch-action:none;}

  /* ---- dial elements ---- */
  .ground{fill:var(--ground);}
  .zband-bg{fill:var(--zband);}
  .orbit-ring{fill:none;stroke:var(--orbit);stroke-width:0.6;}
  .spoke{stroke:var(--spoke);stroke-width:1;}
  .hit{fill:transparent;pointer-events:all;cursor:pointer;}
  .planet,.saturn-ring,.moon-mark{pointer-events:none;}
  .saturn-ring{fill:none;stroke:var(--saturn);stroke-width:0.8;opacity:0.5;}
  .earth-ring{fill:none;stroke:rgba(255,255,255,0.40);stroke-width:1.2;pointer-events:none;}
  .date-month{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;fill:#DCE6FF;
    text-anchor:middle;dominant-baseline:central;pointer-events:none;}
  .date-day{font-family:var(--mono);font-size:16px;fill:#FFFFFF;
    text-anchor:middle;dominant-baseline:central;pointer-events:none;}
  .orbit-ring,.spoke,.planet,.saturn-ring,.moon-mark{pointer-events:none;}

  .zwedge{opacity:0;pointer-events:none;transition:opacity .55s ease;}
  .zwedge.active{opacity:0.40;}
  .zdiv{stroke:var(--divider);stroke-width:0.6;pointer-events:none;}
  .zarc{fill:none;stroke-width:1.4;opacity:0;transition:opacity .55s ease;pointer-events:none;}
  .zarc.active{opacity:0.9;}
  .zlabel{fill:var(--label-dim);font-family:var(--serif);font-weight:300;font-size:23px;
    letter-spacing:1.5px;text-anchor:middle;dominant-baseline:central;pointer-events:none;
    transition:fill .55s ease;}
  .zlabel.active{fill:var(--label);}
  .zglyph path{fill:none;stroke:var(--label-dim);stroke-width:2;stroke-linecap:round;
    stroke-linejoin:round;transition:stroke .55s ease;}
  .zglyph.active path{stroke:var(--label);}
  #twilightCone{pointer-events:none;}
  .hide-twilight #twilightCone{display:none;}

  .conj-line{stroke:var(--conjunction);fill:none;pointer-events:none;}

  /* dial finishes */
  #texture,#sparkles{display:none;pointer-events:none;}
  .bg-textured #texture,.bg-sparkle #texture{display:block;}
  .bg-sparkle #sparkles{display:block;}
  .tline{stroke:#FFFFFF;}
  .sparkle{opacity:0.55;animation:twinkle var(--d,4s) ease-in-out infinite;animation-delay:var(--dl,0s);}
  @keyframes twinkle{0%,100%{opacity:var(--o0,0.15);}50%{opacity:var(--o1,0.85);}}

  /* sign occupant labels */
  .zoccupant{font-family:var(--mono);font-size:16px;letter-spacing:.02em;text-anchor:middle;
    dominant-baseline:central;opacity:0;transition:opacity .45s ease;pointer-events:none;}
  .zoccupant.active{opacity:1;}
  .zhit{fill:transparent;pointer-events:all;cursor:pointer;}

  .bezel-ring{fill:none;}
  .bezel-edge{fill:none;stroke-width:1;}

  .sun-core{fill:var(--sun);}
  .hand-min,.hand-hour{fill:var(--hand);stroke:rgba(0,0,0,0.40);stroke-width:0.5;}
  .hub{fill:var(--hand);}
  .hub-dot{fill:#15161A;}
  .hand-min,.hand-hour,.hub,.hub-dot{pointer-events:none;}

  /* visibility toggles */
  .hide-orbits .orbit-ring{display:none;}
  .hide-spokes .spoke{display:none;}
  .hide-zlabels .zglyph{display:none;}
  .hide-dividers .zdiv{display:none;}
  .hide-conj .conj-line{display:none;}
  .hide-hands .hand-min,.hide-hands .hand-hour,.hide-hands .hub,.hide-hands .hub-dot{display:none;}
  .hide-moon .disc-moon{display:none;}

  /* ---- control panel ---- */
  #gear{position:fixed;top:max(10px,env(safe-area-inset-top));right:12px;z-index:60;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--label);
    background:rgba(14,20,34,0.85);border:1px solid rgba(255,255,255,0.12);
    border-radius:8px;padding:8px 12px;cursor:pointer;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
  #gear:active{transform:scale(0.97);}

  #panel{position:fixed;top:0;left:0;right:0;z-index:50;
    max-height:min(80vh,80dvh);overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:rgba(8,11,18,0.94);border-bottom:1px solid rgba(255,255,255,0.10);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    transform:translateY(-101%);transition:transform .26s ease;
    padding:54px 18px 22px;font-family:var(--mono);color:var(--label);font-size:12px;}
  #panel.open{transform:translateY(0);}

  #panel details{border-top:1px solid rgba(255,255,255,0.07);padding:8px 0;}
  #panel details:first-of-type{border-top:none;}
  #panel summary{cursor:pointer;color:#AEBDDE;letter-spacing:.1em;text-transform:uppercase;
    font-size:11px;list-style:none;padding:6px 0;user-select:none;}
  #panel summary::-webkit-details-marker{display:none;}
  #panel summary::after{content:'+';float:right;color:var(--label-dim);}
  #panel details[open] summary::after{content:'\2013';}

  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:7px 2px;}
  .row label{flex:1;color:var(--label);}
  .row .val{color:#AEBDDE;min-width:48px;text-align:right;}
  input[type=range]{flex:1.4;accent-color:var(--sun);height:22px;}
  input[type=checkbox]{accent-color:var(--sun);width:17px;height:17px;}
  .swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:8px;padding:6px 0;}
  .sw{display:flex;align-items:center;gap:8px;}
  .sw span{flex:1;color:var(--label);font-size:11px;text-align:right;}
  input[type=color]{width:30px;height:24px;padding:0;border:1px solid rgba(255,255,255,0.15);
    border-radius:5px;background:none;cursor:pointer;}
  input[type=color]::-webkit-color-swatch-wrapper{padding:2px;}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:3px;}
  select{font-family:var(--mono);font-size:12px;color:#AEBDDE;background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 8px;cursor:pointer;}
  .btnrow{display:flex;gap:10px;padding-top:12px;}
  .btn{flex:1;font-family:var(--mono);font-size:12px;letter-spacing:.05em;color:#AEBDDE;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
    border-radius:7px;padding:10px;cursor:pointer;}
  .btn:active{transform:scale(0.98);}
  #motionBtn{display:none;}
  .note{color:var(--label-dim);font-size:10.5px;line-height:1.5;padding:4px 2px 0;}

  /* tooltip */
  #tip{position:fixed;z-index:40;pointer-events:none;
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:#E7ECF7;
    background:rgba(10,14,24,0.92);border:1px solid rgba(255,255,255,0.14);
    border-radius:6px;padding:5px 9px;white-space:nowrap;
    transform:translate(-50%,-150%);opacity:0;transition:opacity .12s ease;}
  #tip.show{opacity:1;}

  /* sign info card */
  #signcard{position:fixed;z-index:42;pointer-events:none;text-align:center;color:#E7ECF7;
    background:rgba(10,14,24,0.95);border:1px solid rgba(255,255,255,0.14);border-radius:11px;
    padding:11px 16px 9px;min-width:104px;transform:translate(-50%,-118%);
    opacity:0;transition:opacity .13s ease;font-family:var(--mono);}
  #signcard.show{opacity:1;}
  #signcard .sc-glyph{display:block;margin:0 auto 5px;color:#EAF0FF;}
  #signcard .sc-name{font-family:var(--serif);font-size:16px;letter-spacing:.04em;}
  #signcard .sc-pl{font-size:10.5px;color:#9FB0D8;margin-top:4px;letter-spacing:.03em;line-height:1.35;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>

      <select id="earthMode">

        <option value="keplerian">Keplerian</option>
      </select>
    </div>
    <div class="row">

    </div>
    <div class="note" id="simClock">15 JUN 2026  ·  13:53</div>
    <div class="row">
      <label for="parallaxOn">Parallax</label>
      <input id="parallaxOn" type="checkbox" checked="">
    </div>
    <div class="row">
      <label for="parallax">Parallax strength</label>
      <input id="parallax" type="range" min="0" max="1.5" step="0.05" value="0.7">
      <span class="val" id="parallaxVal">0.70</span>

    <button id="motionBtn" class="btn">Enable device tilt</button>
    <div class="note">Desktop uses the cursor for parallax. On phones, tap “Enable device tilt”.</div>

  <details>

  function frame(now){

    // Earth's heliocentric angle, and the rotation that pins Earth at 3 o'clock (stationary mode).
    // Stationary mode rotates the whole scene (and the zodiac) by this amount.
    var aE=((EARTH.start+EARTH_RATE*simT)%360+360)%360;
    var rot=cfg.earthFixed ? ((360-aE)%360) : 0;     // Earth display angle = aE + rot = 0 (3 o'clock)

    BODIES.forEach(function(b){
      var rate=360/(b.period*EARTH_YEAR);       // deg per sim-second

        world[b.key]={x:e.x+b.r*Math.cos(rad), y:e.y+b.r*Math.sin(rad), a:da};

        var px=-tiltX*MAXPX*cfg.parallax*b.weight*on;
        var py=-tiltY*MAXPX*cfg.parallax*b.weight*on;
        groups[b.key].setAttribute('transform','translate('+px.toFixed(2)+' '+py.toFixed(2)+') rotate('+da.toFixed(3)+' '+CX+' '+CY+')');
        world[b.key]={x:CX+b.r*Math.cos(rad)+px, y:CY+b.r*Math.sin(rad)+py, a:da};
      }
    });

    // turn the zodiac wheel and its hit targets to match the frame

    zhits.setAttribute('transform','rotate('+rot.toFixed(3)+' '+CX+' '+CY+')');

    // TRUE geocentric directions, from real orbital distances (NOT the drawn log radii).
    // This is what an observer on Earth actually sees: the sign and conjunction sky.

      geo[key]={g:g, si:Math.floor(lon/30), deg:Math.floor(lon%30)};

    setGeo('sun', aE+180);                            // Sun appears opposite Earth's heliocentric position

    var occ={};
    (occ[geo['sun'].si]||(occ[geo['sun'].si]=[])).push('sun');
    BODIES.forEach(function(b){
      if(b.key==='earth'||b.moon)return;

    // zodiac highlight; glyphs repositioned, kept upright, as the wheel turns
    for(var i=0;i<12;i++){
      var keys=occ[i];
      var lit=cfg.glow && !!keys;
      zwedges[i].classList.toggle('active',lit);
      zarcs[i].classList.toggle('active',lit);
      zglyphs[i].classList.toggle('active',lit);

      var lc=(i*30+15+rot)%360, gp=pt(lc,ZLAB);

    var curSign=(pinnedSign!=null)?pinnedSign:(hoveredSign!=null?hoveredSign:-1);

          '<div class="sc-name">'+SIGN_FULL[curSign]+'</div><div class="sc-pl">'+pl+'</div>';
        signcard.classList.add('show');
      }
      var cp=pt((curSign*30+15+rot)%360,ZLAB);
      var rr=svg.getBoundingClientRect(), scl=rr.width/1000;
      var sx=rr.left+cp[0]*scl, sy=rr.top+cp[1]*scl;

        signcard.style.left=sx+'px'; signcard.style.top=sy+'px';

        cardCX=0; cardCY=0;

        if(cr.top<6)cardCY=6-cr.top; else if(cr.bottom>vh-6)cardCY=(vh-6)-cr.bottom;

    }else if(shownCardSig){
      signcard.classList.remove('show'); shownCardSig='';
    }

    // sim clock: starts at the real boot time, advances at (speed x) real time
    var d=new Date(bootMs+simT*1000);
    var mh=(d.getMinutes()+d.getSeconds()/60);
    var minDeg=mh*6;
    var hrDeg=((d.getHours()%12)+mh/60)*30;
    document.getElementById('handMin').setAttribute('transform','rotate('+minDeg+' '+CX+' '+CY+')');
    document.getElementById('handHour').setAttribute('transform','rotate('+hrDeg+' '+CX+' '+CY+')');

    // date complication rides Earth, upright
    var ew=world['earth'];
    dateMonth.setAttribute('x',ew.x); dateMonth.setAttribute('y',ew.y-7.5); dateMonth.textContent=MONTHS[d.getMonth()];
    dateDay.setAttribute('x',ew.x);   dateDay.setAttribute('y',ew.y+4.5);   dateDay.textContent=d.getDate();
    var hh=('0'+d.getHours()).slice(-2), mm=('0'+d.getMinutes()).slice(-2);

      var x1=ew.x+L*Math.cos(ds-hw), y1=ew.y+L*Math.sin(ds-hw);

    // Conjunctions inside twilight (within 12.5 deg of the Sun) are hidden.
    while(conjHost.firstChild)conjHost.removeChild(conjHost.firstChild);

      items.sort(function(p,q){return p.g-q.g;});

      var start=0, maxGap=-1;

        var gap=(items[(gi+1)%n].g-items[gi].g+360)%360;
        if(gap>maxGap){maxGap=gap;start=(gi+1)%n;}

        var prev=items[(start+ci-1)%n], it=items[(start+ci)%n];
        if((it.g-prev.g+360)%360<=cfg.conjDeg)cur.push(it);
        else{clusters.push(cur);cur=[it];}
      }
      clusters.push(cur);

      clusters.forEach(function(group){
        if(group.length<2)return;
        var nPlanets=0, hasMoon=false, sx=0, sy=0;
        group.forEach(function(m){
          if(m.moon)hasMoon=true; else nPlanets++;

        });
        if(nPlanets===0)return;
        var meanG=Math.atan2(sy,sx)*180/Math.PI;
        var sep=Math.abs(meanG-geo['sun'].g)%360; if(sep>180)sep=360-sep;
        if(sep<TWILIGHT)return;                                          // lost in twilight

        var score=nPlanets+(hasMoon?0.5:0);          // Moon is a half step
        var t=Math.max(0,Math.min(1,(score-1.5)/2.5)); // 1.5 -> whisper, 4.0 -> heaviest
        var ep=pt(((meanG+90+rot)%360+360)%360, ZIN);  // the conjunction's spot on the zodiac
        conjHost.appendChild(el('line',{class:'conj-line',x1:E.x,y1:E.y,x2:ep[0],y2:ep[1],
          'stroke-width':(0.5+t*1.9).toFixed(2),'stroke-opacity':(0.07+t*0.53).toFixed(3)}));
      });
    }

    // tooltip
    var show=hovered||pinned;
    if(show){
      var w=world[show.key]||{x:CX,y:CY};
      var r=svg.getBoundingClientRect();
      var sc=r.width/1000;
      tip.style.left=(r.left+w.x*sc)+'px';
      tip.style.top =(r.top +w.y*sc)+'px';
      var s=geo[show.key];                                 // earth maps to the Sun's sign
      if(s)tip.textContent=show.name+'  \u00B7  '+SIGN_FULL[s.si]+' '+s.deg+'\u00B0';
      else tip.textContent=show.name;
      tip.classList.add('show');
    }else{
      tip.classList.remove('show');
    }

    requestAnimationFrame(frame);
  }
  // ---- live ephemeris (production) ----
  // Try to load astronomy-engine and recompute each body's start angle for the real current date.
  // a = heliocentric ecliptic longitude - 90 (planets/Earth); Moon uses geocentric longitude.
  // If the script is blocked or offline, the baked-in snapshot above is used unchanged.
  var AE_URL='https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.js';
  function applyEphemeris(A){
    try{
      var date=new Date(bootMs+simT*1000);   // the sim clock (= real now at boot)
      BODIES.forEach(function(b){
        var rate=360/(b.period*EARTH_YEAR), lon;
        if(b.moon){ lon=A.EclipticGeoMoon(date).lon; }
        else{
          var key=b.key.charAt(0).toUpperCase()+b.key.slice(1);
          if(!A.Body[key])return;
          lon=A.EclipticLongitude(A.Body[key],date);    // heliocentric, equinox of date
        }
        b.start=(((lon-90)-rate*simT)%360+360)%360;      // seamless at the current simT
      });
    }catch(e){/* keep snapshot */}
  }
  (function loadEphemeris(){
    if(window.Astronomy){ applyEphemeris(window.Astronomy); return; }
    var s=document.createElement('script');
    s.src=AE_URL; s.async=true; s.crossOrigin='anonymous';
    s.onload=function(){ if(window.Astronomy) applyEphemeris(window.Astronomy); };
    s.onerror=function(){/* blocked/offline -> snapshot stays */};
    document.head.appendChild(s);
  })();

  requestAnimationFrame(frame);

})();
</script>
