      Waterfront 4-star spa hotel on the Hvar Town promenade, steps from the
      catamaran terminal; rooftop pool and bar over the harbour.

  - hotel: "Hotel Indigo London - Paddington"
    status: confirmed
    website: "https://www.indigopaddington.com"
    address: "12-20 London Street, London W2 1HL, United Kingdom"
    phone: "+44 20 7706 4444"
