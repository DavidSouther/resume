    image_query: "InterContinental Vienna hotel"
    blurb: >
      Overlooking the Stadtpark in central Vienna, near the Konzerthaus and
      the Kärntner Strasse shopping district.

destinations:
  - name: "Stratford-upon-Avon"
    wikipedia:
      title: "Stratford-upon-Avon"
      url: "https://en.wikipedia.org/wiki/Stratford-upon-Avon"
      summary_api: "https://en.wikipedia.org/api/rest_v1/page/summary/Stratford-upon-Avon"
    image_query: "Stratford-upon-Avon Shakespeare birthplace"
    blurb: "Warwickshire market town, Shakespeare's birthplace, about two hours from London."

  - name: "Wachau Valley"
    wikipedia:
      title: "Wachau"
      url: "https://en.wikipedia.org/wiki/Wachau"
      summary_api: "https://en.wikipedia.org/api/rest_v1/page/summary/Wachau"
    image_query: "Wachau Valley Danube vineyards Austria"
    blurb: "UNESCO-listed stretch of the Danube west of Vienna; terraced vineyards and riverside abbeys."

  - name: "Schönbrunn Palace"
    wikipedia:
      title: "Schönbrunn_Palace"
      url: "https://en.wikipedia.org/wiki/Sch%C3%B6nbrunn_Palace"
      summary_api: "https://en.wikipedia.org/api/rest_v1/page/summary/Sch%C3%B6nbrunn_Palace"
    image_query: "Schönbrunn Palace Vienna gardens"
    blurb: "Former Habsburg summer residence in Vienna; a UNESCO World Heritage site with baroque gardens."

  - name: "Stari Grad"
    wikipedia:
      title: "Stari_Grad,_Croatia"
      url: "https://en.wikipedia.org/wiki/Stari_Grad,_Croatia"
      summary_api: "https://en.wikipedia.org/api/rest_v1/page/summary/Stari_Grad,_Croatia"
    image_query: "Stari Grad Hvar old town"
    blurb: "One of the oldest towns in Europe, on the north side of Hvar; the Stari Grad Plain is UNESCO-listed."

  - name: "Split"
    wikipedia:
      title: "Split,_Croatia"
      url: "https://en.wikipedia.org/wiki/Split,_Croatia"
      summary_api: "https://en.wikipedia.org/api/rest_v1/page/summary/Split,_Croatia"
    image_query: "Split Croatia Diocletian's Palace waterfront"
    blurb: "Dalmatian coastal city built around Diocletian's Palace; the ferry/air gateway to Hvar."

activities:
  - event: "Dinner by Heston Blumenthal"
    official_url: "https://www.mandarinoriental.com/en/london/hyde-park/dine"
    image_query: "Dinner by Heston Blumenthal Mandarin Oriental London"
    blurb: >
      Two-Michelin-star restaurant at the Mandarin Oriental Hyde Park. Note: the
      hotel has announced the restaurant is closing - re-confirm it is open on 13 Jul.
    tips: "Reservation already confirmed for 2 at 19:30."

  - event: "Stratford-upon-Avon"
    destination_ref: "Stratford-upon-Avon"
    image_query: "Stratford-upon-Avon Royal Shakespeare Theatre river"
    blurb: "Day trip from London; pairs with the evening dinner reservation."

  - event: "Wachau Valley"
    destination_ref: "Wachau Valley"
    image_query: "Wachau Danube river cruise Dürnstein"
    blurb: "Day excursion from Vienna - river valley, vineyards, Melk and Dürnstein."

  - event: "Schönbrunn Palace + evening concert"
    destination_ref: "Schönbrunn Palace"
    official_url: "https://www.schoenbrunn.at/en/"
    image_query: "Schönbrunn Palace evening classical concert"
    blurb: "Palace and gardens by day; classical concert in the Orangery in the evening."

  - event: "Cooking class"
    destination_ref: "Stari Grad"
    image_query: "Dalmatian cooking class Hvar peka"
    blurb: "Hands-on Dalmatian cooking class in Stari Grad."

  - event: "Lavender fields"
    image_query: "Hvar lavender fields Velo Grablje Croatia"
    blurb: >
      Hvar is famous for lavender; the villages of Velo Grablje and Brusje sit
      amid the fields. Peak bloom is June-early July, so late July may be past peak.

  - event: "Scuba diving (tentative)"
    image_query: "scuba diving Pakleni Islands Hvar Croatia"
    blurb: "Dive sites cluster around the Pakleni Islands off Hvar Town. Still to be booked."

  - event: "Dinner in Split"
    destination_ref: "Split"
    image_query: "Split Croatia restaurant Diocletian's Palace dining"
    blurb: "Final-night dinner in Split before the flight back to London."

# Advisory "before you go" layer. Failure-silent: deleting this block leaves the
# page unchanged. Each rule-bearing item links its AUTHORITATIVE government source
# and does not restate the rule as settled fact. Stamped by the trip-prep skill.
trip_prep:
  checked_on: "2026-06-07"
  summary: "Two US passports: one UK ETA each; no ETIAS yet; EES enrolment at Vienna."
  checklist:
    - label: "UK ETA — apply for each traveler (£20)"
      status: action_needed
      url: "https://www.gov.uk/eta"
      detail: "Multi-entry, valid 2 years; one ETA covers both UK entries."
      applies_to: ["David Souther", "Anne Levine"]
      lead_time_days: 7
    - label: "Confirm passports valid through ~2026-10-22"
      status: in_progress
      url: "https://europa.eu/youreurope/citizens/travel/entry-exit/non-eu-nationals/index_en.htm"
      detail: "Schengen needs >=3 months past departure (22 Jul) and issued within 10 years."
    - label: "ETIAS — no action (launches Q4 2026)"
      status: no_action
      url: "https://travel-europe.europa.eu/en/etias"
  notes:
    - "EES biometric enrolment at first Schengen entry (Vienna) unless already enrolled on an entry after 10 Apr 2026; allow extra time. Exit recorded at Split."
    - "Vienna→Split is an internal Schengen flight: no passport control, security only."
    - "Schengen 90/180: add this trip's ~8 days to any Schengen days in the prior 180 (e.g. a February Switzerland stay); confirm the running total stays under 90. EES now tallies it automatically."
    - "Customs: UK £390 / EU €430 / US $800 + 1 L alcohol per person."
  sources:
    - { title: "gov.uk — UK ETA", url: "https://www.gov.uk/eta" }
    - { title: "European Commission — EES", url: "https://home-affairs.ec.europa.eu/news/entryexit-system-will-become-fully-operational-10-april-2026-2026-03-30_en" }