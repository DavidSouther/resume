meta:
  trip_ref: "trip-annie-david-europe.yaml"
  wikipedia_summary_api_pattern: "https://en.wikipedia.org/api/rest_v1/page/summary/{TITLE}"
  flightaware_pattern: "https://flightaware.com/live/flight/{ICAO_CALLSIGN}{NUMBER}"
  # Central traveler-document registry — STATUS/METADATA ONLY. Never raw passport,
  # visa, or ETA reference numbers (this file deploys publicly); valid_until is
  # coarse "YYYY-MM" by rule, never an exact day. Authored by the trip-prep skill.
  travelers:
    - name: "David Souther"
      passport_country: "US"
      documents:
        - { type: passport, status: in_progress, note: "confirm valid through >=2026-10; set valid_until once known" }
        - { type: uk_eta, status: action_needed }
    - name: "Anne Levine"
      passport_country: "US"
      documents:
        - { type: uk_eta, status: action_needed }

