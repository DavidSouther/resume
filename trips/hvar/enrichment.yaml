    image_query: "Hotel Indigo London Paddington exterior"
    blurb: >
      Boutique IHG hotel by Hyde Park and Little Venice, a short walk from
      Paddington station; used for both London stays.

  - hotel: "InterContinental Vienna"
    status: confirmed
    website: "https://vienna.intercontinental.com"
